services:
  resume-agent:
    container_name: lifeos-resume-agent
    image: lifeos-resume-agent:local
    build:
      context: .
      args:
        VITE_BASE_PATH: /life/career/
    networks:
      - ai-network
    volumes:
      - /mnt/data/life-os/resume-agent:/root/.resume-agent
      - /mnt/data/life-os/resume-agent-import:/imports:ro
    env_file:
      - /etc/lifeos/resume-agent.env
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import json,urllib.request;
          data=json.load(urllib.request.urlopen('http://127.0.0.1:5173/api/health',timeout=5));
          assert data.get('ok') and data.get('data',{}).get('status')=='ok'
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 40s

networks:
  ai-network:
    external: true
    name: ai-network
